name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Fast gates (fail early, save CI minutes) ───

  check-test-presence:
    name: test presence
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
          persist-credentials: false
      - name: Check filter modules have tests
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1 || true
          bash scripts/check-test-presence.sh "origin/${{ github.base_ref }}"

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --locked --all-targets -- -D unsafe_code

  # ─── Parallel gates (all need code to compile) ───

  test:
    name: test (${{ matrix.os }})
    needs: clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --all

  security:
    name: Security Scan
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit cargo-deny

      - name: Cargo Audit (CVE check)
        run: |
          if cargo audit --deny warnings 2>&1 | tee audit.log; then
            audit_failed=0
          else
            audit_failed=1
          fi
          {
            echo "## Security Scan Results"
            echo ""
            echo "### Dependency Vulnerabilities"
            if [ "$audit_failed" -eq 0 ]; then
              echo "No known vulnerabilities detected"
            else
              echo "Vulnerabilities found:"
              echo '```'
              cat audit.log
              echo '```'
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$audit_failed" -ne 0 ]; then
            echo "::error::Dependency vulnerabilities detected"
            exit 1
          fi

      - name: Cargo Deny (policy check)
        run: cargo deny check advisories bans sources

      - name: Critical files check
        if: github.event_name == 'pull_request'
        run: |
          CRITICAL=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -E "(runner|summary|execution|init|pnpm_cmd|container)\.rs|Cargo\.toml|workflows/.*\.yml" || true)
          {
            echo "### Critical Files Modified"
            if [ -n "$CRITICAL" ]; then
              echo "**HIGH RISK**: The following critical files were modified:"
              echo '```'
              echo "$CRITICAL"
              echo '```'
              echo ""
              echo "**Required Actions:**"
              echo "- [ ] Manual security review by 2 maintainers"
              echo "- [ ] Verify no shell injection vectors"
              echo "- [ ] Check input validation remains intact"
            else
              echo "No critical files modified"
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$CRITICAL" ]; then
            echo "::warning::Critical RTK files modified - enhanced review required"
          fi

      - name: Dangerous patterns scan
        if: github.event_name == 'pull_request'
        run: |
          PATTERNS=$(git diff "origin/${{ github.base_ref }}...HEAD" | grep -E "Command::new\(\"sh\"|Command::new\(\"bash\"|\.env\(\"LD_PRELOAD|\.env\(\"PATH|reqwest::|std::net::|TcpStream|UdpSocket|unsafe \{|\.unwrap\(\) |panic!\(|todo!\(|unimplemented!\(" || true)
          {
            echo "### Dangerous Code Patterns"
            if [ -n "$PATTERNS" ]; then
              echo "**Potentially dangerous patterns detected:**"
              echo '```diff'
              echo "$PATTERNS" | head -30
              echo '```'
              echo ""
              echo "**Security Concerns:**"
              echo "$PATTERNS" | grep -q "Command::new" && echo "- Shell command execution detected" || true
              echo "$PATTERNS" | grep -q "\.env\(\"" && echo "- Environment variable manipulation" || true
              echo "$PATTERNS" | grep -q "reqwest::\|std::net::\|TcpStream\|UdpSocket" && echo "- Network operations added" || true
              echo "$PATTERNS" | grep -q "unsafe" && echo "- Unsafe code blocks" || true
              echo "$PATTERNS" | grep -q "\.unwrap\(\)\|panic!\(" && echo "- Panic-inducing code" || true
            else
              echo "No dangerous patterns detected"
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$PATTERNS" ]; then
            echo "::warning::Dangerous code patterns detected - manual review required"
          fi

      - name: New dependencies check
        if: github.event_name == 'pull_request'
        run: |
          if git diff "origin/${{ github.base_ref }}...HEAD" Cargo.toml | grep -E "^\+.*=" | grep -v "^\+\+\+" > new_deps.txt; then
            deps_added=1
          else
            deps_added=0
          fi
          {
            echo "### Dependencies Changes"
            if [ "$deps_added" -eq 1 ]; then
              echo "**New dependencies added:**"
              echo '```toml'
              cat new_deps.txt
              echo '```'
              echo ""
              echo "**Required Actions:**"
              echo "- [ ] Audit each new dependency on crates.io"
              echo "- [ ] Check maintainer reputation and download counts"
              echo "- [ ] Verify no typosquatting (e.g., 'reqwest' vs 'request')"
            else
              echo "No new dependencies added"
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$deps_added" -eq 1 ]; then
            echo "::warning::New dependencies require supply chain audit"
          fi

      - name: Clippy security lints
        run: |
          if cargo clippy --locked --all-targets -- -A warnings -W clippy::unwrap_used -W clippy::panic -W clippy::expect_used 2>&1 | tee clippy.log | grep -E "warning:|error:"; then
            clippy_triggered=1
          else
            clippy_triggered=0
          fi
          {
            echo "### Clippy Security Lints"
            if [ "$clippy_triggered" -eq 1 ]; then
              echo "Security-related lints triggered:"
              echo '```'
              grep -E "warning:|error:" clippy.log | head -20
              echo '```'
            else
              echo "All security lints passed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$clippy_triggered" -eq 1 ]; then
            echo "::warning::Clippy security lints failed"
          fi

      - name: Summary verdict
        run: |
          {
            echo "---"
            echo ""
            echo "### Security Review Verdict"
            echo ""
            echo "**This is an automated security scan. A human maintainer must:**"
            echo "1. Review all warnings above"
            echo "2. Verify PR intent matches actual code changes"
            echo "3. Check for subtle backdoors or logic bombs"
            echo ""
            echo "**For high-risk PRs (critical files modified):**"
            echo "- Require approval from 2 maintainers"
            echo "- Test in isolated environment before merge"
          } >> "$GITHUB_STEP_SUMMARY"

  semgrep:
    name: semgrep security scan
    needs: clippy
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: semgrep scan --config .semgrep.yml --error

  enterprise-audit:
    name: enterprise data-egress audit
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install audit tools
        run: |
          cargo install --locked cargo-audit cargo-deny
          go install github.com/zricethezav/gitleaks/v8@latest
          python -m pip install semgrep
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Enterprise audit
        run: scripts/enterprise-audit.sh

  benchmark:
    name: benchmark
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build rtk
        run: cargo build --locked --release

      - name: Install system tools
        run: sudo apt-get install -y tree

      - name: Install Python tools
        run: pip install ruff pytest mypy

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install Go tools
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run benchmark
        run: ./scripts/benchmark.sh
