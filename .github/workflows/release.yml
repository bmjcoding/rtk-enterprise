name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Enterprise release gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install audit tools
        run: |
          cargo install --locked cargo-audit cargo-deny
          go install github.com/zricethezav/gitleaks/v8@latest
          python -m pip install semgrep
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Enterprise audit
        run: scripts/enterprise-audit.sh

      - name: Full test suite
        run: cargo test --locked --all

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          # Linux
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            musl: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Install musl tools
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd "target/${{ matrix.target }}/release"
          tar -czvf "../../../rtk-${{ matrix.target }}.${{ matrix.archive }}" rtk
          cd ../../..

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd "target/${{ matrix.target }}/release"
          7z a "../../../rtk-${{ matrix.target }}.${{ matrix.archive }}" rtk.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtk-${{ matrix.target }}
          path: rtk-${{ matrix.target }}.${{ matrix.archive }}

  build-deb:
    name: Build DEB package
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install --locked cargo-deb

      - name: Build DEB
        run: cargo deb --locked

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: rtk-deb
          path: target/debian/*.deb

  build-rpm:
    name: Build RPM package
    needs: verify
    runs-on: ubuntu-latest
    container: fedora:latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          dnf install -y rust cargo rpm-build

      - name: Install cargo-generate-rpm
        run: cargo install --locked cargo-generate-rpm

      - name: Build release
        run: cargo build --locked --release

      - name: Generate RPM
        run: cargo generate-rpm

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rtk-rpm
          path: target/generate-rpm/*.rpm

  release:
    name: Create Release
    needs: [build, build-deb, build-rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.rpm" \) -exec cp "{}" release/ \;

      - name: Create version-agnostic package names
        run: |
          cd release
          for f in *.deb; do
            [ -f "$f" ] && cp "$f" "rtk_amd64.deb"
          done
          for f in *.rpm; do
            [ -f "$f" ] && cp "$f" "rtk.x86_64.rpm"
          done

      - name: Create checksums
        run: |
          cd release
          sha256sum ./* > checksums.txt

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: release/rtk.spdx.json
          upload-artifact: false

      - name: Refresh checksums with SBOM
        run: |
          cd release
          find . -maxdepth 1 -type f ! -name '*.sig' ! -name '*.pem' -print0 \
            | sort -z \
            | xargs -0 sha256sum > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release assets
        run: |
          cd release
          while IFS= read -r -d '' file; do
            name="${file#./}"
            cosign sign-blob --yes \
              --output-signature "${name}.sig" \
              --output-certificate "${name}.pem" \
              "$file"
          done < <(find . -maxdepth 1 -type f ! -name '*.sig' ! -name '*.pem' -print0 | sort -z)

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/*

      - name: Attest SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-path: release/*
          sbom-path: release/rtk.spdx.json

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: release/*
          prerelease: ${{ inputs.prerelease }}
